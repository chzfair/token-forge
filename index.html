<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palette</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Palette</h1>
    <div class="mode-group">
      <button class="mode-btn active" data-mode="random">Random</button>
      <button class="mode-btn" data-mode="complementary">Complementary</button>
      <button class="mode-btn" data-mode="analogous">Analogous</button>
      <button class="mode-btn" data-mode="triadic">Triadic</button>
    </div>
    <button id="generate-btn">Generate</button>
  </header>
  <main id="swatches"></main>
  <script src="script.js"></script>
</body>
</html>
