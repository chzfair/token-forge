<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Token Forge</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ─── Shared header — one instance, always visible on every screen ─── -->
  <header class="header">
    <button class="logo" id="logoHomeBtn">
      <div class="logo-mark">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="7" height="7" rx="1.5" fill="currentColor"/>
          <rect x="11" y="2" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.4"/>
          <rect x="2" y="11" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.4"/>
          <rect x="11" y="11" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.7"/>
        </svg>
      </div>
      <span class="logo-text">Token Forge</span>
    </button>
  </header>

  <!-- ─── Screen: Home ─── -->
  <div id="screen-home" class="screen">
    <main class="main">
      <section class="hero">
        <div class="hero-content">
          <h1 class="title">Token Forge</h1>
          <p class="tagline">Build shadcn design systems from any brand</p>
          <button class="btn-primary" id="startBtn">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M8 2.5V13.5M2.5 8H13.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            Start New Brand
          </button>
        </div>
      </section>

      <section class="gallery-section">
        <div class="gallery-header">
          <h2 class="gallery-title">Saved Brands</h2>
          <span class="gallery-count" id="brandCount">0 brands</span>
        </div>
        <div class="gallery" id="gallery">
          <div class="gallery-empty">
            <div class="empty-icon">
              <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="6" y="6" width="13" height="13" rx="2.5" stroke="currentColor" stroke-width="1.5"/>
                <rect x="21" y="6" width="13" height="13" rx="2.5" stroke="currentColor" stroke-width="1.5"/>
                <rect x="6" y="21" width="13" height="13" rx="2.5" stroke="currentColor" stroke-width="1.5"/>
                <rect x="21" y="21" width="13" height="13" rx="2.5" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3 2"/>
              </svg>
            </div>
            <p class="empty-title">No brands yet</p>
            <p class="empty-subtitle">Your saved design systems will appear here</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- ─── Screen: Wizard (blank background — overlay sits on top) ─── -->
  <div id="screen-wizard" class="screen" style="display:none"></div>

  <!-- ─── Screen: Review ─── -->
  <div id="screen-review" class="screen" style="display:none">
    <main class="review-main">
      <div class="review-container">
        <div class="review-top">
          <div class="review-title-block">
            <div class="review-check">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M3 8L6.5 11.5L13 4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div>
              <h1 class="review-brand-name" id="reviewBrandName"></h1>
              <p class="review-subtitle">Review and edit your design tokens</p>
            </div>
          </div>
          <div class="review-header-actions">
            <button class="btn-ghost" id="reviewBackBtn">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                <path d="M11 6.5H2M6 2L2 6.5L6 11" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Back to Step 4
            </button>
            <button class="btn-primary" id="reviewPreviewBtn">
              Preview Components
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M2 7H12M7 2L12 7L7 12" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>
        <div id="contrastBannerContainer"></div>
        <div class="token-sections" id="tokenSections"></div>
      </div>
    </main>
  </div>

  <!-- ─── Screen: Preview ─── -->
  <div id="screen-preview" class="screen" style="display:none"></div>

  <!-- ─── Screen: Export ─── -->
  <div id="screen-export" class="screen" style="display:none"></div>

  <!-- ─── Wizard overlay — fixed, sits above whichever screen is active ─── -->
  <div class="wizard-overlay" id="wizardOverlay" aria-hidden="true">
    <div class="wizard" role="dialog" aria-modal="true" aria-label="New Brand">

      <div class="wizard-header">
        <nav class="wizard-progress" id="wizardProgress" aria-label="Wizard progress"></nav>
        <button class="wizard-close" id="wizardClose" aria-label="Close">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="wizard-body" id="wizardBody"></div>

      <div class="wizard-footer">
        <button class="btn-ghost" id="btnBack">Back</button>
        <div class="wizard-footer-right">
          <span class="wizard-step-counter" id="stepCounter"></span>
          <button class="btn-primary" id="btnNext">
            Next
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M2 7H12M7 2L12 7L7 12" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- ─── Delete confirmation modal ─── -->
  <div class="delete-overlay" id="deleteOverlay" aria-hidden="true">
    <div class="delete-modal" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle">
      <h2 class="delete-modal-title" id="deleteModalTitle"></h2>
      <p class="delete-modal-message">Are you sure you want to delete this brand? This cannot be undone.</p>
      <div class="delete-modal-actions">
        <button class="btn-ghost delete-modal-cancel" id="deleteCancelBtn">Cancel</button>
        <button class="delete-modal-confirm" id="deleteConfirmBtn">Delete</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
